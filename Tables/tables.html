<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h3>Jam Toko</h3>

    <table border="1" style="background-color:rgb(0, 1, 23)"> <!--Border untuk membuat tabelnya lebih bagus-->
        <tr align="center" style="background-color:lightblue"> <!--TR = Table Row-->
            <th width="85">Senin</th> <!--TH = Table Header-->
            <th width="85">Selasa</th>
            <th width="85">Rabu</th>
            <th width="85">Kamis</th>
            <th width="85">Juma't</th>
            <th width="85">Sabtu</th>
            <th width="85">Minggu</th>
            <!--Width pada TH digunakan untuk mengatur lebar dari tabel tersebut,
                opsional, ga pakai juga ga masalah-->
        </tr>
        <tr align="center" style="background-color:aliceblue">
            <td>10-18</td> <!--TD = Table Data-->
            <td>10-18</td>
            <td>11-17</td>
            <td>11-17</td>
            <td>13-20</td>
            <td>10-16</td>
            <td>Tutup</td>
        </tr>
    </table>
</body>
</html>
