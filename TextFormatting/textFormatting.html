<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextFormatting</title>
</head>
<body>
    <p>Ini normal text</p>
    <p>Ini <b>Bold</b> text</p>
    <p>Ini <i>Italic</i> text</p>
    <p>Ini <u>Underlined</u> text</p>
    <p>Ini <del>Deleted</del> text</p>
    <p>Ini <big>Big</big> text</p>
    <p>Ini <small>Small</small> text</p>
    <p>Ini <sub>Subscript</sub> text</p>
    <p>Ini <sup>Superscript</sup> text</p>
    <p>Ini <tt>Monospaced</tt> text</p>
    <p>Ini <mark>Mark/Highlight</mark> text</p>
    <p>Bisa juga <mark style="background-color:rgb(82, 249, 255)">Gini</mark> gokil</p>
</body>
</html>
