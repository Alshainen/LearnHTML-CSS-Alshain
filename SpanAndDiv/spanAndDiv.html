<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpanAndDiv</title>
</head>
<body>
    <!--"SPAN" adalah wadah untuk bagian kecil di dalam teks.
        Dia dipakai saat kamu cuma mau membungkus sebagian kata atau frasa, 
        biasanya untuk diberi style, warna, atau efek tertentu. span itu inline, 
        jadi dia menempel di dalam baris yang sama dan tidak memulai baris baru.-->

        <h1><span style="background-color:rgb(165, 165, 255)">Halo bos, ini SPAN!</span></h1>

    <!--div adalah wadah untuk mengelompokkan elemen-elemen lain.
        Dia dipakai saat kamu mau bikin satu blok besar yang isinya bisa banyak: teks, gambar, tombol, dan lain-lain. 
        div itu block, jadi dia biasanya mulai di baris baru dan mengambil lebar satu baris penuh.-->

        <h1><div style="background-color:rgb(255, 156, 156)">Halo bos, ini DIV!</div></h1>
        <!--Bisa dilihat, DIV itu bukan hanya fokus ke teks itu saja, tapi fokus ke keseluruhan elemen,
            dan yup, elemen di DIV yang ini bukan cuman teks, karena box teksnya sebenarnya mencakup
            dari awal layar sampai akhir secara horizontal, ingat, itu box dari teks yang sebenarnya.-->

        <div style="background-color:rgb(154, 255, 154)"><h1>Halo semua</h1></div>
        <!--Ini penggunaan DIV yang bener sih-->

        <!--Span adalah inline level container
            sedangkan Div adalah block level container-->
</body>
</html>
